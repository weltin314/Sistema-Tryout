<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Jogadores</title>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2c2c54);
            color: white;
            overflow-x: hidden;
        }

        .navbar {
            width: 100%;
            background: #1a1a2e;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .navbar h2 {
            margin: 0;
            font-size: 18px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .nav-home {
            background: #00a8ff;
        }

        .nav-home:hover {
            background: #0097e6;
        }

        .container {
            padding: 30px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 80%;
            margin: 30px auto;
            border-collapse: collapse;
            background: #2f2f4f;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: #00a8ff;
        }

        tr:nth-child(even) {
            background: #3a3a5f;
        }

        tr:hover {
            background: #50507a;
        }

        .topo {
            text-align: center;
            margin-bottom: 20px;
        }

        .novo {
            background: #00a8ff;
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
        }

        .novo:hover {
            background: #0097e6;
        }

        .acoes {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            padding: 6px 10px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-size: 14px;
        }

        .editar {
            background: #fbc531;
        }

        .editar:hover {
            background: #e1a200;
        }

        .btn-icone {
            padding: 6px 10px;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .deletar {
            background: #e84118;
        }

        .deletar:hover {
            background: #c23616;
        }

        .nav-links {
            display: flex;
            gap: 10px;
        }

    </style>
</head>

<body>

<div class="navbar">
    <h2>🎮 Sistema Tryout</h2>

    <div class="nav-links">
        <a href="/administrativo" class="nav-home">
            <i class="fa-solid fa-house"></i> Home
        </a>

        <a href="/avaliacao" class="nav-home">
            <i class="fa-solid fa-star"></i> Avaliação
        </a>
    </div>
</div>

<div class="container">

    <h1>Lista de Jogadores</h1>

    <div class="topo">
        <a href="/cadastroPlayer" class="novo">Novo Jogador</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nick</th>
            <th>Idade</th>
            <th>Função</th>
            <th>Ações</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="player : ${players}">
            <td th:text="${player.id}"></td>
            <td th:text="${player.name}"></td>
            <td th:text="${player.age}"></td>
            <td th:text="${player.role}"></td>

            <td>
                <div class="acoes">
                    <a th:href="@{/editarPlayer/{id}(id=${player.id})}" class="btn editar">
                        Editar
                    </a>

                    <a th:href="@{/deletarPlayer/{id}(id=${player.id})}"
                       class="btn-icone deletar"
                       onclick="return confirm('Tem certeza que deseja deletar?')">
                        <i class="fa-solid fa-trash"></i>
                    </a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
